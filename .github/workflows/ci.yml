# ============================================================
# QuerySafe — GitHub Actions CI/CD Pipeline
# Runs on: push to any branch, PRs targeting main
# Jobs:
#   1. lint        → ruff + black formatting check
#   2. test        → pytest with services (postgres, redis, chroma)
#   3. build       → docker build (validate images)
#   4. deploy      → push images to GHCR + deploy (main branch only)
# ============================================================

name: QuerySafe CI/CD

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint & Format ─────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install ruff black mypy

      - name: Run ruff (fast linter)
        run: ruff check backend/ --output-format=github

      - name: Run black (format check)
        run: black --check backend/

      - name: Run mypy (type check — non-blocking)
        run: mypy backend/ --ignore-missing-imports --no-error-summary || true

  # ── Job 2: Unit & Integration Tests ─────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: querysafe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      chroma:
        image: chromadb/chroma:latest
        ports:
          - 8001:8001

    env:
      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/querysafe_test
      REDIS_URL: redis://localhost:6379
      CHROMA_URL: http://localhost:8001
      AI_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_SECRET: test_jwt_secret_do_not_use_in_prod
      ENCRYPTION_KEY: test_encryption_key_32byteslong!!
      SECURITY_SERVICE_URL: http://localhost:8000
      DATABASE_SERVICE_URL: http://localhost:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run database migrations
        working-directory: backend
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U postgres -d querysafe_test -f ../migrations/001_init.sql

      - name: Run unit tests
        working-directory: backend
        run: |
          pytest tests/ \
            -v \
            --cov=ai \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Job 3: Docker Build Validation ───────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: querysafe-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Validate docker-compose syntax
        run: |
          docker compose config --quiet

  # ── Job 4: Publish & Deploy (main branch only) ───────────────
  deploy:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production (SSH)
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/querysafe
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull backend
            docker compose up -d --no-deps --remove-orphans backend
            docker compose exec -T backend python -c "print('Deploy health check passed')"
            docker image prune -f

      - name: Notify on success
        if: success()
        run: |
          echo "✅ QuerySafe backend deployed successfully — commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed — check logs above"
          exit 1
