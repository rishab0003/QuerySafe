user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_proxied any;

    client_max_body_size 10m;

    upstream backend_up {
        server backend:8000;
    }

    upstream frontend_up {
        server frontend:3000;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=()" always;

        # Real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        location /api/ {
            proxy_pass http://backend_up/; # keep trailing slash to preserve path
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass http://frontend_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            try_files $uri $uri/ /index.html;
        }

        location = /50x.html {
            internal;
            default_type application/json;
            return 502 '{"error":"bad_gateway"}';
        }

        error_page 502 503 504 /50x.html;
    }
}
# ============================================================
# Nginx Reverse Proxy Configuration — QuerySafe
# Routes:
#   /api/*   → backend:8000  (FastAPI)
#   /*       → frontend:3000 (Next.js)
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml
                       application/xml application/xml+rss text/javascript;

    # ── Security headers (applied globally) ──────────────────
    add_header X-Frame-Options          "SAMEORIGIN"             always;
    add_header X-Content-Type-Options   "nosniff"                always;
    add_header X-XSS-Protection         "1; mode=block"          always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate limiting ────────────────────────────────────────
    # Limit to 30 requests per second per IP (burst of 60)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ── Upstream definitions ─────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Server block ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Max body size (for connection payload uploads)
        client_max_body_size 10M;

        # Request timeout
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  120s;

        # Common proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ── /api/* → FastAPI backend ─────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            # Strip /api prefix before forwarding
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age 3600;
                add_header Content-Length 0;
                return 204;
            }
        }

        # ── /auth/* → tighter rate limit for auth endpoints ──
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend;
        }

        # ── /health → backend health check ───────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── /* → Next.js frontend ─────────────────────────────
        location / {
            proxy_pass http://frontend;

            # WebSocket support (for Next.js HMR in dev)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static assets with long cache ────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Block common attack patterns ──────────────────────
        location ~* \.(php|asp|aspx|cgi|sh|bash)$ {
            return 403;
        }

        # ── Custom error pages ────────────────────────────────
        error_page 404              /404.html;
        error_page 500 502 503 504  /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /dev/stdout main;
  error_log /dev/stderr warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10M;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/html
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    text/javascript;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream backend_upstream {
    server backend:8000;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /api {
      return 301 /api/;
    }

    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_pass http://backend_upstream/;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_pass http://frontend_upstream;
    }
  }
}