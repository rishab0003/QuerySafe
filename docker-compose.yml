# ============================================================
# QuerySafe — Docker Compose
# All 6 services: backend, frontend, postgres, redis, chroma, nginx
# ============================================================

version: "3.9"

services:
  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: querysafe-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-querysafe_pass}@postgres:5432/querysafe
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      - CHROMA_URL=http://chroma:8001
      - SECURITY_SERVICE_URL=http://backend:8000
      - DATABASE_SERVICE_URL=http://backend:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - querysafe-net
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: querysafe-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL (Metadata DB) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: querysafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: querysafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-querysafe_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d querysafe"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (Session Memory + Token Blacklist) ───────────────
  redis:
    image: redis:7-alpine
    container_name: querysafe-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_pass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly no
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (Vector Store for Schema Embeddings) ──────────
  chroma:
    image: chromadb/chroma:latest
    container_name: querysafe-chroma
    restart: unless-stopped
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8001
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=false
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8001:8001"
    networks:
      - querysafe-net

  # ── Nginx (Reverse Proxy) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: querysafe-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Networks ───────────────────────────────────────────────────
networks:
  querysafe-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  chroma-data:
    driver: local
  huggingface-cache:
    driver: local
  nginx-logs:
    driver: local
