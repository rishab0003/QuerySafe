version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CHROMA_URL: http://chroma:8001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_SERVICE_URL: http://backend:8000
      SECURITY_SERVICE_URL: http://backend:8000
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:80
    depends_on:
      - postgres
      - redis
      - chroma
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - querysafe-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: querysafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d querysafe"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - querysafe-net
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8001

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - querysafe-net

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  querysafe-net:
    driver: bridge
