# version line removed; using default version

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        USE_MINIMAL_DEPS: 'false'
      target: runtime
    container_name: querysafe-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-querysafe_pass}@postgres:5432/querysafe
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      CHROMA_URL: http://chroma:8000
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:80
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-http://localhost:8000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@querysafe.io}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-QuerySafe!2026}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      # SMTP for email OTP during 2FA setup (MailHog in dev)
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@querysafe.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - '8000:8000'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: querysafe-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # When running in Docker, 'localhost' inside the frontend container
      # refers to the container itself. Point API URL to the backend service.
      NEXT_PUBLIC_API_URL: http://backend:8000/api
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: querysafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: querysafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-querysafe_pass}
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d querysafe']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: querysafe-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-redis_pass}']
    ports:
      - '6379:6379'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_pass}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    container_name: querysafe-chroma
    restart: unless-stopped
    ports:
      - '8001:8000'
    networks:
      - querysafe-net
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8000"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.25-alpine
    container_name: querysafe-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - querysafe-net
  mailhog:
    image: mailhog/mailhog:latest
    container_name: querysafe-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  querysafe-net:
    driver: bridge
