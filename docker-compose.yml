version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: querysafe-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-querysafe_pass}@postgres:5432/querysafe
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      CHROMA_URL: http://chroma:8001
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:80
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - '8000:8000'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: querysafe-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: querysafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: querysafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-querysafe_pass}
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d querysafe']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: querysafe-redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-redis_pass}']
    ports:
      - '6379:6379'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_pass}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    container_name: querysafe-chroma
    restart: unless-stopped
    ports:
      - '8001:8001'
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8001/api/v1/heartbeat || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.25-alpine
    container_name: querysafe-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - querysafe-net
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  querysafe-net:
    driver: bridge
